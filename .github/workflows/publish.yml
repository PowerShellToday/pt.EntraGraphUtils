name: Publish to PowerShell Gallery

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g. 0.0.1-test)"
        required: true
        default: "0.0.1-test"

jobs:
  publish:
    name: Tag and publish
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: write
    env:
      MODULE_NAME: ${{ github.event.repository.name }}

    steps:
      - uses: actions/checkout@v6

      # Step 1 — Determine version from manifest or manual input
      - name: Read version
        id: version
        shell: pwsh
        run: |
          if ('${{ github.event.inputs.version }}') {
            $full = '${{ github.event.inputs.version }}'
          } else {
            $manifest = Import-PowerShellDataFile "./src/$env:MODULE_NAME.psd1"
            $semver   = $manifest.ModuleVersion
            $pre      = $manifest.PrivateData.PSData.Prerelease
            $full     = if ($pre) { "$semver-$pre" } else { $semver }
          }
          if ($full -notmatch '^\d+\.\d+\.\d+(-[a-zA-Z0-9.]+)?$') {
            Write-Error "Version '$full' is not valid semver. Expected format: 1.2.3 or 1.2.3-rc1"
            exit 1
          }
          Write-Host "Version: $full"
          "version=$full" | Out-File $env:GITHUB_OUTPUT -Append
          "tag=v$full"    | Out-File $env:GITHUB_OUTPUT -Append

      # Step 2 — Skip if this version tag already exists (non-src push to main)
      - name: Check if tag already exists
        id: check
        run: |
          if git ls-remote --tags origin "refs/tags/${{ steps.version.outputs.tag }}" | grep -q .; then
            echo "Tag ${{ steps.version.outputs.tag }} already exists — skipping publish."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      # Step 3 — Create and push tag
      - name: Create version tag
        if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      # Step 4 — Build and publish
      - name: Install PlatyPS
        if: steps.check.outputs.skip == 'false'
        shell: pwsh
        run: Install-Module PlatyPS -Scope CurrentUser -Force

      - name: Build module
        if: steps.check.outputs.skip == 'false'
        shell: pwsh
        run: ./build.ps1 -Version '${{ steps.version.outputs.version }}'

      - name: Validate manifest
        if: steps.check.outputs.skip == 'false'
        shell: pwsh
        run: |
          $manifest = Test-ModuleManifest -Path "./dist/$env:MODULE_NAME/$env:MODULE_NAME.psd1"
          if (-not $manifest) {
            Write-Error "Manifest validation failed."
            exit 1
          }
          Write-Host "Manifest OK — v$($manifest.Version)"

      - name: Publish to PSGallery
        if: steps.check.outputs.skip == 'false'
        shell: pwsh
        env:
          PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
        run: |
          # Publish first — PSGallery can resolve Microsoft.Graph.Authentication from its
          # own feed, so RequiredModules works correctly and ExternalModuleDependencies
          # must be empty for the dependency to appear in gallery metadata.
          Publish-Module -Path "./dist/$env:MODULE_NAME" -NuGetApiKey $env:PSGALLERY_API_KEY -Verbose

      - name: Patch manifest for GitHub Packages
        if: steps.check.outputs.skip == 'false'
        shell: pwsh
        run: |
          # GitHub Packages does not host Microsoft.Graph.Authentication, so mark it as
          # external before publishing there — Update-ModuleManifest handles non-empty arrays.
          $psd1         = "./dist/$env:MODULE_NAME/$env:MODULE_NAME.psd1"
          $externalDeps = (Import-PowerShellDataFile -Path $psd1).RequiredModules
          if ($externalDeps) {
            Update-ModuleManifest -Path $psd1 -ExternalModuleDependencies $externalDeps
          }

      - name: Publish to GitHub Packages
        if: steps.check.outputs.skip == 'false'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $owner   = '${{ github.repository_owner }}'.ToLower()
          $feedUrl = "https://nuget.pkg.github.com/$owner/index.json"
          $cred    = [PSCredential]::new(
              '${{ github.actor }}',
              (ConvertTo-SecureString $env:GITHUB_TOKEN -AsPlainText -Force)
          )
          Register-PSRepository -Name 'GitHubPackages' `
              -SourceLocation    $feedUrl `
              -PublishLocation   $feedUrl `
              -InstallationPolicy Trusted `
              -Credential        $cred
          Publish-Module -Path "./dist/$env:MODULE_NAME" `
              -Repository  'GitHubPackages' `
              -NuGetApiKey $env:GITHUB_TOKEN `
              -Credential  $cred `
              -Verbose
